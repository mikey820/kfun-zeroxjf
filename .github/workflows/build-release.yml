name: Build & Release IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1). Omit to use the next vX.Y.Z."
        required: false
        type: string
      notes:
        description: "Release notes."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build IPA
        run: ./scripts/build.sh

      - name: Verify artifact
        run: |
          ls -la build/
          test -f build/kfun-zeroxjf.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kfun-zeroxjf-ipa
          path: build/kfun-zeroxjf.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Compute release tag
        id: tag
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [[ -n "${INPUT_TAG}" ]]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
            echo "create_tag=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          latest=$(git ls-remote --tags origin 'refs/tags/v[0-9]*.[0-9]*.[0-9]*' \
            | awk '{print $2}' \
            | sed -E 's#refs/tags/##; s#\^\{\}$##' \
            | awk -F. '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { printf "%d %d %d %s\n", substr($1, 2), $2, $3, $0 }' \
            | sort -k1,1n -k2,2n -k3,3n \
            | tail -1 \
            | awk '{print $4}')
          if [[ -z "$latest" ]]; then
            next="v1.0.0"
          else
            ver=${latest#v}
            major=${ver%%.*}
            rest=${ver#*.}
            minor=${rest%%.*}
            patch=${rest#*.}
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=${next}" >> "$GITHUB_OUTPUT"
          echo "create_tag=true" >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.tag.outputs.create_tag == 'true'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists locally."
          else
            git tag "${TAG}"
          fi
          git push origin "refs/tags/${TAG}" || echo "Tag push: nothing to do."

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          NOTES_INPUT: ${{ github.event.inputs.notes }}
        run: |
          set -euo pipefail
          NOTES="${NOTES_INPUT}"
          if [[ -z "${NOTES}" ]]; then
            NOTES="$(git log -1 --pretty=%s)"
          fi
          TITLE="kfun-zeroxjf ${TAG}"
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; uploading IPA (clobber)."
            gh release upload "${TAG}" build/kfun-zeroxjf.ipa --repo "${GITHUB_REPOSITORY}" --clobber
            gh release edit "${TAG}" --repo "${GITHUB_REPOSITORY}" --title "${TITLE}" --latest
          else
            gh release create "${TAG}" build/kfun-zeroxjf.ipa \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TITLE}" \
              --latest \
              --notes "${NOTES}"
          fi
